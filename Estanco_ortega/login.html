<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estanco Ortega - Inicio de Sesión</title>
    <script>
        const cTheme = localStorage.getItem('estanco_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', cTheme);
    </script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-box">
            <img src="img/logo.png" alt="Logo Estanco Ortega" class="login-logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <h1 class="fallback-logo-text" style="display:none;">🍷 Estanco Ortega</h1>
            <p>Por favor, inicia sesión para continuar.</p>
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary">Ingresar</button>
            </form>
        </div>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
