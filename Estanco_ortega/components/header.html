<header class="main-header">
    <div class="header-content">
        <div class="logo">
            <a href="#inicio" aria-label="Volver al inicio" class="header-logo-link">
                <img src="img/logo.png" alt="Logo Estanco Ortega" class="header-logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-flex';">
                <span class="fallback-logo-text">Estanco Ortega</span>
            </a>
        </div>
        <div class="header-actions">
            <button id="theme-toggle-btn" class="menu-btn" aria-label="Cambiar Tema" title="Modo Claro/Oscuro">
                🌓
            </button>
            <button id="open-cart-btn" class="menu-btn btn-cart-flex" aria-label="Ver Carrito" title="Ver Carrito">
                🛒 <span id="cart-count" class="cart-badge">0</span>
            </button>
            <button id="mobile-menu-btn" class="menu-btn" aria-label="Abrir menú" title="Menú">
                ☰
            </button>
        </div>
    </div>
</header>
